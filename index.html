<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>흫_ᬉ᭰ᮁᤳ𝙈𝙍ܓ WASSI </06_ᬉ᭰-MD | WhatsApp Bot Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6c63ff; --secondary: #8f5eff; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --muted: #94a3b8; --border: #334155; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .navbar-brand { font-weight: 800; color: var(--primary) !important; font-size: 1.5rem; }
        .stats-card { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; font-weight: 700; border-radius: 10px; padding: 10px 20px; }
        .btn-danger { background: #ef4444; border: none; border-radius: 10px; }
        .console-body { background: #000; border-radius: 10px; height: 250px; overflow-y: auto; padding: 15px; font-family: monospace; font-size: 12px; color: #10b981; }
        .hidden { display: none !important; }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .connected { background: #10b981; }
        .disconnected { background: #ef4444; }
        
        /* Loading Bar Styles */
        .progress-container { width: 100%; background-color: var(--border); border-radius: 10px; margin-top: 15px; display: none; }
        .progress-bar { width: 0%; height: 10px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 10px; transition: width 0.5s ease; }
        .loading-text { font-size: 12px; color: var(--muted); margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-robot me-2"></i>SHAHBAZ-MD</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="stats-card">
            <h3 id="totalActive">0</h3>
            <p class="mb-0">TOTAL BOT ACTIVE</p>
        </div>

        <div id="setupSection">
            <div class="post-card">
                <h5 class="mb-3"><i class="fas fa-plus-circle me-2"></i>CREATE BOT</h5>
                <div class="input-group mb-3">
                    <input type="text" id="userIdInput" class="form-control" placeholder="Enter Unique Bot Name (e.g., MyBot1)">
                    <button class="btn btn-primary" onclick="selectUser()">CREATE / SELECT</button>
                </div>
            </div>
        </div>

        <div id="userDashboard" class="hidden">
            <div id="stage1">
                <div class="post-card">
                    <h5><i class="fas fa-link me-2"></i>PAIRING CODE</h5>
                    <div class="mb-3">
                        <label class="form-label">WhatsApp Number (with country code)</label>
                        <input type="tel" class="form-control" id="pairNumber" placeholder="923260602960">
                    </div>
                    <button class="btn btn-primary w-100" id="pairBtn">GENERATE CODE</button>
                    
                    <!-- Live Loading Bar -->
                    <div id="progressContainer" class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                        <div class="loading-text">⏳ Connecting to WhatsApp... Please wait.</div>
                    </div>

                    <div id="pairingResult" class="mt-3 text-center h4 text-warning"></div>
                </div>
            </div>

            <div id="stage2" class="hidden">
                <div class="post-card d-flex justify-content-between align-items-center">
                    <div>
                        <span id="connectionStatus" class="status-badge disconnected">DISCONNECTED</span>
                        <span class="ms-2" id="activeBotName"></span>
                    </div>
                    <button class="btn btn-danger btn-sm" id="logoutBtn">LOGOUT</button>
                </div>
                <div class="post-card">
                    <h5><i class="fas fa-terminal me-2"></i>LIVE CONSOLE</h5>
                    <div class="console-body" id="console"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentUserId = null;

        function selectUser() {
            const userId = document.getElementById('userIdInput').value.trim();
            if (!userId) return alert('Enter a bot name');
            currentUserId = userId;
            socket.emit('set-user', userId);
            document.getElementById('activeBotName').innerText = "Bot: " + userId;
            document.getElementById('userDashboard').classList.remove('hidden');
            document.getElementById('stage1').classList.remove('hidden');
            document.getElementById('stage2').classList.add('hidden');
        }

        socket.on('total-active', (count) => {
            document.getElementById('totalActive').innerText = count;
        });

        socket.on('pairing-code', (code) => {
            // Hide loading bar and show code
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('pairingResult').innerText = "YOUR CODE: " + code;
        });

        socket.on('console', (log) => {
            const consoleDiv = document.getElementById('console');
            const entry = document.createElement('div');
            entry.innerHTML = `[${log.timestamp}] ${log.message}`;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        });

        socket.on('connection-status', (status) => {
            const badge = document.getElementById('connectionStatus');
            if (status.connected) {
                badge.className = 'status-badge connected';
                badge.innerText = 'CONNECTED';
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('stage2').classList.remove('hidden');
                document.getElementById('progressContainer').style.display = 'none';
            } else {
                badge.className = 'status-badge disconnected';
                badge.innerText = 'DISCONNECTED';
            }
        });

        let isPairing = false;
        document.getElementById('pairBtn').onclick = () => {
            if (isPairing) return;
            const number = document.getElementById('pairNumber').value;
            if (!number) return alert('Enter number');
            
            isPairing = true;
            document.getElementById('pairBtn').disabled = true;
            
            // Show and animate loading bar
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const pairingResult = document.getElementById('pairingResult');
            
            pairingResult.innerText = "";
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            
            // Simulate progress while waiting for socket response
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += 2;
                    progressBar.style.width = width + '%';
                }
            }, 100);

            socket.emit('pair-request', { userId: currentUserId, number });
            
            // Re-enable after 10 seconds or when code received
            setTimeout(() => {
                isPairing = false;
                document.getElementById('pairBtn').disabled = false;
            }, 10000);
        };

        document.getElementById('logoutBtn').onclick = () => {
            socket.emit('logout', currentUserId);
        };
    </script>
</body>
</html>
